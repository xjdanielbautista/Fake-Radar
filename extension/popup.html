<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #050505;
      color: #ffffff;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .header {
      font-size: 24px;
      font-weight: 800;
      color: #ffffff;
      text-align: left;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 12px;
      color: #a78bfa;
      margin-top: -10px;
    }

    .status {
      padding: 14px;
      color: white;
      text-align: center;
      font-weight: 800;
      border-radius: 14px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #9333ea, #c026d3);
      box-shadow: 0 8px 20px rgba(147, 51, 234, 0.25);
    }

    #resumen {
      background: #0b0b0b;
      padding: 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.5;
      color: #e5e7eb;
      border: 1px solid #242424;
      border-left: 4px solid #a855f7;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">Fake Radar</div>
    <div class="subtitle">Análisis rápido de veracidad</div>

    <div id="semaforo" class="status">
      ESPERANDO...
    </div>

    <div id="resumen">
      Selecciona un texto en cualquier noticia, da clic derecho y elige “Analizar con Fake Radar”.
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
